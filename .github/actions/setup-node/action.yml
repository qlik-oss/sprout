name: "Setup nodejs"
description: "Setup nodejs"
author: "Qlik"

inputs:
  npm-token:
    description: "NPM CI token for registry authentication"
    required: false
    type: string

runs:
  using: "composite"
  steps:
    - name: Cache asdf
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          ~/.asdf/
          $(pnpm store path)
        key: ${{ runner.os }}-${{ hashFiles('**/.tool-versions') }}-v0.18.0
        restore-keys: |
          ${{ runner.os }}-asdf-v0.18.0

    - name: Cache for Turbo
      uses: rharkor/caching-for-turbo@0abc2381e688c4d2832f0665a68a01c6e82f0d6c #v2.3.11

    - name: Install asdf & tools
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Set NPM Token
      shell: bash
      run: echo "//registry.npmjs.org/:_authToken=${{ inputs.npm-token }}" > ~/.npmrc
      if: ${{ inputs.npm-token != '' }}
